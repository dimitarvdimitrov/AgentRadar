name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Run core tests
        run: swift test

      - name: Build app
        run: |
          xcodebuild -project AgentRadar.xcodeproj \
            -scheme AgentRadar \
            -configuration Release \
            -derivedDataPath build-ci \
            CODE_SIGNING_ALLOWED=NO \
            build
